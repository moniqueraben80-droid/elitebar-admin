<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elite Bar Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#111;
color:#fff;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
color:#d4af37;
margin-bottom:30px;
}

.login{
max-width:400px;
margin:auto;
background:#1d1d1d;
padding:30px;
border-radius:15px;
}

input{
width:100%;
padding:15px;
margin:15px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#d4af37;
border:none;
font-size:18px;
font-weight:bold;
cursor:pointer;
border-radius:8px;
}

button:hover{
opacity:.9;
}

#dashboard{
display:none;
margin-top:40px;
}

.card{
background:#222;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

.approve{
background:green;
color:white;
margin-top:10px;
}

.reject{
background:red;
color:white;
margin-top:10px;
}

.status{
font-weight:bold;
color:#d4af37;
}

</style>

</head>

<body>

<div class="container">

<h1>Elite Bar Admin Panel</h1>

<div class="login">

<input
type="password"
id="password"
placeholder="Enter Admin Password">

<button onclick="login()">

Login

</button>

</div>

<div id="dashboard">

<h2 style="margin-bottom:20px;color:#d4af37;">

Reservations

</h2>

<div id="reservations"></div>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyCEqN-t_yyNHp34V83_OdMVEcyVz1UW3TI",

authDomain:"elite-bar-decba.firebaseapp.com",

projectId:"elite-bar-decba",

storageBucket:"elite-bar-decba.firebasestorage.app",

messagingSenderId:"255996688840",

appId:"1:255996688840:web:fe55d92bc014c4fe6ea8fd"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

window.login=function(){

const password=document.getElementById("password").value;

if(password==="elite123"){

document.querySelector(".login").style.display="none";

document.getElementById("dashboard").style.display="block";

loadReservations();

}else{

alert("Wrong Password");

}

};

async function loadReservations(){

const reservations=document.getElementById("reservations");

reservations.innerHTML="";

const snapshot=await getDocs(collection(db,"reservations"));

snapshot.forEach((reservationDoc)=>{

const data=reservationDoc.data();

const id=reservationDoc.id;

reservations.innerHTML+=`

<div class="card">

<h3>${data.name}</h3>

<p><strong>Email:</strong> ${data.email}</p>

<p><strong>Phone:</strong> ${data.phone}</p>

<p><strong>Date:</strong> ${data.date}</p>

<p><strong>Time:</strong> ${data.time}</p>

<p><strong>Guests:</strong> ${data.guests}</p>

<p><strong>Special Request:</strong> ${data.request || "None"}</p>

<p class="status">Status: ${data.status}</p>

<button class="approve" onclick="approve('${id}')">

Approve

</button>

<button class="reject" onclick="rejectReservation('${id}')">

Reject

</button>

</div>

`;

});

}

window.approve=async function(id){

await updateDoc(doc(db,"reservations",id),{

status:"Approved"

});

loadReservations();

};

window.rejectReservation=async function(id){

await updateDoc(doc(db,"reservations",id),{

status:"Rejected"

});

loadReservations();

};

</script>

</div>

</body>

</html>
